<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <script>
    // Xử lý điều hướng cho GitHub Pages
    const segment = 1; // Đặt segment bằng 1 vì repo là /web-cv/
    const path = window.location.pathname.split('/').slice(0, 1 + segment).join('/');
    localStorage.setItem('path', window.location.pathname.slice(path.length));
    window.location.href = path + '/';
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
