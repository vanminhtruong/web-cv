<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web CV</title>
    <!-- Script xử lý điều hướng SPA cho GitHub Pages -->
    <script type="text/javascript">
      // Xử lý chuyển hướng cho GitHub Pages khi sử dụng SPA
      (function() {
        // Không chạy script này khi đang ở trang chủ
        if (window.location.pathname === '/web-cv/' || 
            window.location.pathname === '/web-cv' || 
            window.location.pathname === '/') return;
            
        // Lấy tham số từ URL
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        
        // Nếu có tham số chuyển hướng, điều hướng đến đường dẫn đó
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if(theme && theme !== 'light') {
          document.documentElement.classList.add('dark');
        }

        if(theme && theme !== 'dark') {
          document.documentElement.classList.add(`theme-${theme}`);
        }

        document.write('<style>html.dark{background-color:#111827;color:white;}html.dark body{visibility:hidden;}</style>');
        document.addEventListener('DOMContentLoaded', function() {
          document.body.style.visibility = 'visible';
        });
      })();  
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
